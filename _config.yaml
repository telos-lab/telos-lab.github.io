# site properties and page defaults
title: Telos Lab
subtitle: Technology and Law for Society
description: Pushing the frontier of foundational research in the intersection of law, computer science, and complex systems
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
